services:
  - type: web
    name: motivator-coffee
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: motivator-data
      mountPath: /var/data
      sizeGB: 1
